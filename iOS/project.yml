name: Furfund
options:
  bundleIdPrefix: com.shimondeitel.petsavings
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Furfund:
    type: application
    platform: iOS
    sources:
      - path: Furfund
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.petsavings
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Furfund/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  FurfundTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: FurfundTests
      - path: Furfund.storekit
    dependencies:
      - target: Furfund
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.petsavings.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  FurfundUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: FurfundUITests
    dependencies:
      - target: Furfund
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.petsavings.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Furfund:
    build:
      targets:
        Furfund: all
        FurfundTests: [test]
        FurfundUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Furfund.storekit
    test:
      config: Debug
      storeKitConfiguration: Furfund.storekit
      targets:
        - FurfundTests
        - FurfundUITests
    archive:
      config: Release
